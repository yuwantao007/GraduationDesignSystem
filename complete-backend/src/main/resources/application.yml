spring:
  application:
    name: complete-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/graduation_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    # Hikari 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    # 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰转下划线
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 主键策略
      id-type: ASSIGN_ID
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # Mapper XML文件位置
  mapper-locations: classpath*:mapper/**/*.xml

# Knife4j配置 (Swagger增强版)
knife4j:
  # 开启增强配置
  enable: true
  # 开启生产环境屏蔽
  production: false
  # 开启Basic认证
  basic:
    enable: false
    username: admin
    password: admin123
  setting:
    # 是否显示Footer
    enableFooter: false
    # 是否显示自定义Footer
    enableFooterCustom: true
    footerCustomContent: Copyright © 2026 毕业设计全过程管理系统

# SpringDoc配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  group-configs:
    - group: default
      packages-to-scan: com.yuwan.completebackend.controller
      paths-to-match: /**
  version: 1.0.0
  contact:
    name: 系统架构师
    email: admin@example.com

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minio_admin
  secret-key: MinIO@123
  bucket-name: graduation-system

# JWT配置
jwt:
  secret: complete-backend-jwt-secret-key-2026-graduation-system
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 日志配置
logging:
  level:
    root: INFO
    com.yuwan.completebackend: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/complete-backend.log
    max-size: 10MB
    max-history: 30

# Flowable 流程引擎配置
flowable:
  # 自动创建/更新 ACT_* 表（首次启动自动建表，后续比对升级）
  database-schema-update: true
  # 异步作业执行器（暂不启用，按需开启）
  async-executor-activate: false
  # 历史数据级别：full 记录所有节点流转历史
  history-level: full
  # 禁用不需要的子引擎，减少启动耗时
  dmn:
    enabled: false
  form:
    enabled: false
  content:
    enabled: false
  app:
    enabled: false
  # IDM 引擎：保留 false，本项目用自定义 Spring Security 鉴权，不使用 Flowable IDM
  idm:
    enabled: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
